name: release

# Cross-compile the Synsema binary for Linux/macOS/Windows and publish to a
# GitHub Release. Triggered by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`),
# or manually via the Actions tab. The asset names match install.sh / install.ps1.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: synsema-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: synsema-macos-aarch64
          # Built on the ARM runner (cross to x86_64) — macos-13 Intel runners are
          # scarce/queued on the free tier; Apple's toolchain cross-compiles fine.
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: synsema-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: synsema-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ring (the rustls crypto backend) assembles with NASM on windows-msvc;
      # the runners don't ship it. Linux/macOS use the system assembler (no-op here).
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # SYNSEMA_VERSION = el tag que disparó el release (p. ej. v0.3.2). El binario lo
      # hornea como su versión (ver crates/synsema-cli/build.rs) → `synsema version`
      # reporta el release, no el commit de main.
      - name: Build
        env:
          SYNSEMA_VERSION: ${{ github.ref_name }}
        run: cargo build --release --locked --manifest-path engine/Cargo.toml -p synsema-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "engine/target/${{ matrix.target }}/release/synsema" "${{ matrix.asset }}"
          shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "engine/target/${{ matrix.target }}/release/synsema.exe" "${{ matrix.asset }}"
          (Get-FileHash "${{ matrix.asset }}" -Algorithm SHA256).Hash | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  # NOTE: aarch64-linux is deferred (needs a C cross-toolchain for rusqlite's bundled
  # SQLite). Add it later via `cross` or a gcc-aarch64 setup if there's demand.
